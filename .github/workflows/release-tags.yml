
name: Release tagged build


on:
  push:
    tags: ['*']


permissions:
  contents: write

jobs:
  build-and-release:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'


      - name: Set up JDK 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew


      - name: Build with Gradle
        run: ./gradlew build


      - name: Generate version prefix
        id: version
        run: |
          TIMESTAMP=$(TZ=Asia/Singapore date +'%d%m-%H%M')
          TAG="${{ github.ref_name }}"
          PREFIX="Schematica-${TAG}-${TIMESTAMP}"
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Rename jars with timestamp
        id: rename
        run: |
          mkdir -p build/release
          PREFIX="${{ steps.version.outputs.prefix }}"
          for jar in build/libs/*.jar; do
            filename=$(basename "$jar")
            # 跳过 dirty 版本
            if echo "$filename" | grep -q "dirty"; then
              continue
            fi
            if echo "$filename" | grep -q "\-api\.jar$"; then
              cp "$jar" "build/release/${PREFIX}-api.jar"
            elif echo "$filename" | grep -q "\-dev\.jar$"; then
              cp "$jar" "build/release/${PREFIX}-dev.jar"
            elif echo "$filename" | grep -q "\-sources\.jar$"; then
              cp "$jar" "build/release/${PREFIX}-sources.jar"
            else
              cp "$jar" "build/release/${PREFIX}.jar"
            fi
          done
          echo "release_dir=build/release" >> $GITHUB_OUTPUT
          ls -la build/release/
      - name: Read README
        id: readme
        run: |
          {
            echo "content<<EOF"
            cat README.md
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/*.jar
          name: "${{ steps.version.outputs.tag }} (${{ steps.version.outputs.timestamp }})"
          body: |
            ## Schematica-Plus ${{ steps.version.outputs.tag }}

            Build Time: ${{ steps.version.outputs.timestamp }} (UTC+8)

            **[LunatriusCore](https://github.com/GTNewHorizons/LunatriusCore/releases)**(>= 1.2.1-GTNH) is **NEEDED**.

            ### Artifacts
            - `*.jar` (no suffix) - **Main mod file, put into your mods folder**
            - `*-api.jar` - API package for other mod developers
            - `*-dev.jar` - Development build (non-obfuscated), for mod development & debugging
            - `*-sources.jar` - Source code package

            ---
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
